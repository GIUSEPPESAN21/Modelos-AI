# VAE Configuration — Latin American Public Health Imputation
seed: 42

data:
  val_ratio: 0.15
  test_ratio: 0.15

model:
  hidden_dims: [128, 64]
  latent_dim: 16
  dropout: 0.2

training:
  epochs: 30
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.00001
  beta: 1.0
  patience: 8

paths:
  model_dir: results/trained_models
  metrics_dir: results/metrics
  viz_dir: results/visualizations
