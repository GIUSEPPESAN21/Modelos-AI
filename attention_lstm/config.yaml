seed: 42

data:
  val_ratio: 0.15
  test_ratio: 0.15
  target_col: life_expectancy

model:
  hidden_dim: 64
  num_layers: 2
  dropout: 0.2

training:
  epochs: 25
  batch_size: 16
  learning_rate: 0.001
  patience: 6

paths:
  model_dir: results/trained_models
  metrics_dir: results/metrics
  viz_dir: results/visualizations
